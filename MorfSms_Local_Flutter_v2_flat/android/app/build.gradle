plugins {
    id 'com.android.application'
    id 'kotlin-android'
    id 'dev.flutter.flutter-gradle-plugin'
}

android {
    namespace 'com.codemorf.morfsmslocal'
    compileSdk 34

    defaultConfig {
        applicationId 'com.codemorf.morfsmslocal'
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName '2.0.0'
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }
}

dependencies {}
